<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bento — Organitzador</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3D7AFD">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>📂 Bento</h1>
    <input id="search" class="search" placeholder="Cerca per nom, categoria o etiqueta…" oninput="render()" />
  </header>
  <main>
    <section id="folders" class="folders"></section>
    <section id="list" class="list"></section>
  </main>
  <footer class="add">
    <div class="input-group">
      <label for="docName">Nom</label>
      <input id="docName" />
    </div>
    <div class="input-group">
      <label for="docCategory">Categoria</label>
      <input id="docCategory" />
    </div>
    <div class="input-group">
      <label for="docFolder">Carpeta</label>
      <input id="docFolder" />
    </div>
    <div class="input-group">
      <label for="docSubfolder">Subcarpeta</label>
      <input id="docSubfolder" />
    </div>
    <div class="input-group">
      <label for="docTags">Etiquetes (coma separades)</label>
      <input id="docTags" />
    </div>
    <div class="input-group">
      <label for="docFile">Fitxer (Opcional)</label>
      <input type="file" id="docFile" style="font-size: 11px;" />
    </div>
    <button id="addBtn">Afegir</button>
  </footer>
  <div id="toast" class="toast">Document afegit correctament! ✅</div>
  
  <!-- ✅ SOLUCIÓ: Cargar llibreria Supabase abans d'app.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js'));
  </script>
</body>
</html>
